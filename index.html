<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#1f5fa8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tennis" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Tennis Score</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #1a1a1a;
    font-family: 'Inter', system-ui, sans-serif;
    color: #1a1a1a;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
  }
  body { box-sizing: border-box; }
  #stage {
    width: 100vw;
    height: 100vh;
    height: 100dvh; /* dynamic viewport height — handles mobile address bar */
  }
  * { -webkit-user-select: none; user-select: none; }
  button { font-family: inherit; }
</style>
</head>
<body>
  <div id="stage"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#1f5fa8"/>
      <rect x="30" y="40" width="140" height="120" fill="none" stroke="#fff" stroke-width="3"/>
      <line x1="100" y1="30" x2="100" y2="170" stroke="#fff" stroke-width="4"/>
      <line x1="30" y1="100" x2="170" y2="100" stroke="#fff" stroke-width="2"/>
      <circle cx="100" cy="100" r="14" fill="#d8ff5e" stroke="#fff" stroke-width="2"/>
    </svg>
  </template>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "court": "clay"
    }/*EDITMODE-END*/;
    window.TWEAK_DEFAULTS = TWEAK_DEFAULTS;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="tennis-court.jsx"></script>
  <script type="text/babel" src="tennis-engine.jsx"></script>
  <script type="text/babel" src="tennis-extras.jsx"></script>
  <script type="text/babel" src="tennis-screens.jsx"></script>
  <script type="text/babel" src="tennis-app-fullscreen.jsx"></script>

  <script>
    // Register service worker for PWA / offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
